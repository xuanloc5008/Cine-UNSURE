seed: 2026
device: cuda

data:
  train_h5: data/processed/train_cunsure.h5
  val_h5: data/processed/val_cunsure.h5
  batch_size: 1
  num_workers: 2

model:
  in_channels: 1
  out_channels: 1
  channels: [32, 64, 128, 256]
  strides: [2, 2, 2]
  num_res_units: 2

loss:
  kernel_size: 3
  tau: 0.01
  eta_init: 0.1
  eta_step_size: 0.01
  eta_momentum: 0.9

optim:
  epochs: 100
  lr: 0.0005
  weight_decay: 0.01

output:
  run_dir: runs/cunsure_monai3d
  checkpoint_every: 10
