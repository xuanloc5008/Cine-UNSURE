seed: 2026

data:
  # train_output: processed/train_cunsure_roi.h5
  # val_output: processed/val_cunsure_roi.h5
  test_output: processed/test_cunsure_roi.h5
  channels: 1
  volume_size: [16, 96, 96]
  train_limit:
  val_limit:
  test_limit:
  normalize: percentile
  compression: lzf
  percentile_low: 1.0
  percentile_high: 99.0
  roi_mask_crop: true
  roi_mask_margin: [0, 16, 16]
  require_roi_mask: true
  split_4d: true
  time_axis: -1
  exclude_substrings:
    - _gt
    - gt.nii
    - label
    - seg
  # train_globs:
  #   - datasets/ACDC/database/training/patient*/patient*_4d.nii.gz
  #   - datasets/M&M1/Training/Labeled/*/*_sa.nii.gz
  #   - datasets/M&M1/Training/Unlabeled/*/*_sa.nii.gz

  # val_globs:
  #   - datasets/M&M1/Validation/*/*_sa.nii.gz

  test_globs:
    - datasets/ACDC/database/testing/patient*/patient*_4d.nii.gz
    - datasets/M&M1/Testing/**/*_sa.nii.gz

  # Split by source/patient, never by individual frame.
  mnm2_globs:
    - datasets/MnM2/dataset/*/*_SA_CINE.nii.gz
  mnm2_test_fraction: 0.30
