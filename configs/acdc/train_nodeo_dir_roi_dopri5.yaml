seed: 2026
device: auto

data:
  manifest: processed/acdc/nodeo_roi_splits.jsonl
  min_length: 2

model:
  image_shape: [16, 96, 96]
  encoder_channels: 32
  encoder_depth: 5
  output_downsamples: 1
  bottleneck_dim: 32

  # K * v_theta(phi(t), t) is evaluated at every adaptive ODE function call.
  smoothing_kernel: gaussian
  smoothing_window: 11
  smoothing_sigma: 2.0
  smoothing_passes: 1
  time_encoding: periodic

  solver: dopri5
  rtol: 1.0e-6
  atol: 1.0e-8

loss:
  ncc_win: 9
  minimum_jacobian: 0.5
  maximum_jacobian: 4.0
  lambda_j: 2.5
  lambda_v: 0.00005
  lambda_df: 0.02
  lambda_cycle: 0.05

uncertainty:
  method: late_checkpoint_ensemble
  model_uncertainty_tail: 100
  model_uncertainty_stride: 5
  model_uncertainty_scale: 1.0

optim:
  epochs_per_sequence: 500
  lr: 0.002
  weight_decay: 0.0
  selection_tail: 100
  log_every: 25

output:
  run_dir: runs/acdc/nodeo_dir_dopri5
