option: 2
device: auto

selection:
  split: test
  patient: patient101

data:
  manifest: processed/acdc/nodeo_roi_splits.jsonl
  manifest_config: configs/acdc/nodeo_roi_splits.yaml

nodeo:
  # Change this value to euler, rk4, or dopri5.
  solver: rk4
  solver_profiles:
    euler:
      run_config: configs/acdc/train_nodeo_dir_roi_euler.yaml
      precomputed_dir: runs/acdc/nodeo_dir_euler
      sde_output_dir: runs/acdc/sde_sequence_posthoc_euler
    rk4:
      run_config: configs/acdc/train_nodeo_dir_roi.yaml
      precomputed_dir: runs/acdc/nodeo_dir
      sde_output_dir: runs/acdc/sde_sequence_posthoc_rk4
    dopri5:
      run_config: configs/acdc/train_nodeo_dir_roi_dopri5.yaml
      precomputed_dir: runs/acdc/nodeo_dir_dopri5
      sde_output_dir: runs/acdc/sde_sequence_posthoc_dopri5

sde:
  config: configs/acdc/run_sde_sequence_posthoc.yaml

validation:
  datasets_root: datasets
  high_error_mm: 2.0
  roi_mask_margin: [0, 16, 16]

clinical:
  lv_label: 3
  coverage: 0.95
  roi_mask_margin: [0, 16, 16]

output:
  run_dir: runs/acdc/patient_sequence_workflow
