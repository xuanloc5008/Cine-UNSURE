option: 2
device: auto

selection:
  split: test
  patient: patient101

data:
  manifest: processed/acdc/nodeo_roi_splits.jsonl
  manifest_config: configs/acdc/nodeo_roi_splits.yaml

nodeo:
  # Change this value to euler, rk4, or dopri5.
  solver: rk4
  solver_profiles:
    euler:
      run_config: configs/acdc/train_nodeo_dir_roi_euler.yaml
      precomputed_dir: runs/acdc/nodeo_dir_euler
      sde_output_dir: runs/acdc/sde_sequence_posthoc_euler
    rk4:
      run_config: configs/acdc/train_nodeo_dir_roi.yaml
      precomputed_dir: runs/acdc/nodeo_dir
      sde_output_dir: runs/acdc/sde_sequence_posthoc_rk4
    dopri5:
      run_config: configs/acdc/train_nodeo_dir_roi_dopri5.yaml
      precomputed_dir: runs/acdc/nodeo_dir_dopri5
      sde_output_dir: runs/acdc/sde_sequence_posthoc_dopri5
    rk4_multiscale:
      run_config: configs/acdc/experiments/02_rk4_multiscale.yaml
      precomputed_dir: runs/acdc/experiments/02_rk4_multiscale
      sde_output_dir: runs/acdc/sde_sequence_posthoc_rk4_multiscale
    rk4_highres:
      run_config: configs/acdc/experiments/03_rk4_highres_velocity.yaml
      precomputed_dir: runs/acdc/experiments/03_rk4_highres_velocity
      sde_output_dir: runs/acdc/sde_sequence_posthoc_rk4_highres
    rk4_structural:
      run_config: configs/acdc/experiments/04_rk4_structural.yaml
      precomputed_dir: runs/acdc/experiments/04_rk4_structural
      sde_output_dir: runs/acdc/sde_sequence_posthoc_rk4_structural
    rk4_lbfgs:
      run_config: configs/acdc/experiments/05_rk4_adam_lbfgs.yaml
      precomputed_dir: runs/acdc/experiments/05_rk4_adam_lbfgs
      sde_output_dir: runs/acdc/sde_sequence_posthoc_rk4_lbfgs
    rk4_temporal:
      run_config: configs/acdc/experiments/07_rk4_temporal_adjacent.yaml
      precomputed_dir: runs/acdc/experiments/07_rk4_temporal_adjacent
      sde_output_dir: runs/acdc/sde_sequence_posthoc_rk4_temporal

sde:
  config: configs/acdc/run_sde_sequence_posthoc.yaml

validation:
  datasets_root: datasets
  high_error_mm: 2.0
  roi_mask_margin: [0, 16, 16]

clinical:
  lv_label: 3
  coverage: 0.95
  roi_mask_margin: [0, 16, 16]

output:
  run_dir: runs/acdc/patient_sequence_workflow
