seed: 2026
device: auto

data:
  train_h5: processed/acdc/train_cunsure_roi.h5
  val_h5: processed/acdc/val_cunsure_roi.h5
  batch_size: 8
  num_workers: 16
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2

model:
  in_channels: 1
  out_channels: 1
  channels: [32, 64, 128, 256]
  strides: [2, 2, 2]
  num_res_units: 2

score:
  delta_min: 0.001
  delta_max: 0.1

optim:
  epochs: 100
  lr: 0.0005
  weight_decay: 0.01
  lr_gamma: 0.1
  grad_clip: 1.0
  early_stopping_patience: 0
  early_stopping_min_delta: 0.000001

output:
  run_dir: runs/acdc/cunsure_score
  checkpoint_every: 10
