seed: 2026
device: auto

evaluation:
  checkpoint: runs/acdc/cunsure_score/best.pt
  test_h5: processed/acdc/test_cunsure_roi.h5
  output_dir: runs/acdc/cunsure_score/unsure_protocol_evaluation

  # The UNSURE paper reports a 100-image FastMRI test subset.
  num_frames: 100
  batch_size: 4
  noise_repeats: 3
  data_range: 1.0
  save_examples: 4

  # Figure 3 uses 0.05--0.50; 0.03 is also included because it is the
  # FastMRI measurement-noise level. Here noise is injected in image space.
  noise_models:
    - name: iid_gaussian
      type: iid_gaussian
      sigmas: [0.03, 0.05, 0.10, 0.20, 0.30, 0.40, 0.50]
    - name: colored_gaussian_box3
      type: box_correlated_gaussian
      blur_kernel_size: 3
      sigmas: [0.03]

  # Kernel-support ablation corresponding to the spirit of Table 2.
  estimator_kernel_sizes: [1, 3, 5]
  primary_kernel_size: 3
  spectral_floor: 0.000001
  relative_spectral_floor: 0.01
  covariance_floor: 0.0
