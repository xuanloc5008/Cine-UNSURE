seed: 2026
device: auto

data:
  manifest: processed/acdc/nodeo_roi_splits.jsonl
  min_length: 2

model:
  image_shape: [16, 96, 96]
  encoder_channels: 16
  encoder_depth: 4
  output_downsamples: 2
  bottleneck_dim: 16
  smoothing_kernel: gaussian
  smoothing_window: 11
  smoothing_sigma: 2.0
  smoothing_passes: 1
  time_encoding: periodic
  solver: euler
  step_size: 0.1

loss:
  ncc_win: 9
  minimum_jacobian: 0.5
  maximum_jacobian: 4.0
  lambda_j: 2.5
  lambda_v: 0.00005
  lambda_df: 0.02
  lambda_cycle: 0.05

uncertainty:
  method: late_checkpoint_ensemble
  # This profile can stop before the final 50 configured epochs.
  model_uncertainty_tail: 200
  model_uncertainty_stride: 5
  model_uncertainty_scale: 1.0

optim:
  # The wall-clock limit is checked after each complete optimization epoch.
  epochs_per_sequence: 200
  minimum_epochs: 10
  # Reserve roughly 5 seconds for final evaluation and serialization.
  max_runtime_seconds: 25
  lr: 0.005
  weight_decay: 0.0
  selection_tail: 200
  log_every: 10

output:
  run_dir: runs/acdc/nodeo_dir_fast
