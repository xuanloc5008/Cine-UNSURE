seed: 2026
device: cuda

input:
  globs:
    - datasets/ACDC/database/testing/patient107/patient107_4d.nii.gz
  exclude_substrings:
    - _gt
    - gt.nii
    - label
    - seg
  split_4d: true
  time_axis: -1
  limit: 4
  normalize: percentile
  percentile_low: 1.0
  percentile_high: 99.0
  output_dir: runs/selected/cinema_jacobian_batch

cunsure:
  checkpoint: runs/selected/cunsure_best_epoch10.pt

foundation:
  name: cinema
  repo_path: ../CineMA
  view: sax
  pool: cls
  cache_dir:

jacobian:
  chunk_size: 8
  save_jacobian: false
  save_raw_covariance: false
