seed: 2026
device: auto

data:
  manifest: processed/nodeo_roi_splits.jsonl
  min_length: 2

model:
  image_shape: [16, 96, 96]
  encoder_channels: 32
  encoder_depth: 5
  output_downsamples: 2
  bottleneck_dim: 16
  smoothing_kernel: gaussian
  smoothing_window: 15
  smoothing_sigma: 3.0
  smoothing_passes: 1
  solver: euler
  step_size: 0.05

loss:
  ncc_win: 21
  minimum_jacobian: 0.5
  lambda_j: 2.5
  lambda_v: 0.00005
  lambda_df: 0.05

optim:
  epochs_per_sequence: 300
  lr: 0.005
  weight_decay: 0.0
  selection_tail: 50
  log_every: 20

output:
  run_dir: runs/nodeo_dir_roi
