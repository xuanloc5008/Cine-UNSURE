seed: 2026
device: auto

input:
  h5: processed/train_cunsure_roi.h5
  h5_key: y
  start_index: 0
  limit:
  resume: true
  output_dir: runs/selected/cinema_score_cunsure_roi_train

score:
  checkpoint: runs/cunsure_score_monai3d_roi/best.pt

foundation:
  name: cinema
  repo_path: ../CineMA
  view: sax
  pool: cls
  cache_dir:

noise_estimation:
  kernel_size: 3
  spectral_floor: 0.000001
  relative_spectral_floor: 0.01
  covariance_floor: 0.0
  save_diagnostics: false

propagation:
  num_samples: 32
  sample_batch_size: 8
  tau: 0.01
  difference_scheme: forward
  covariance_storage: diag
