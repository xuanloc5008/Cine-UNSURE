seed: 2026
device: auto

data:
  h5: runs/selected/latent_observations_cinema_cunsure_mc.h5
  sequence_index: runs/selected/sde_sequence_index.jsonl
  min_length: 2
  covariance: diag
  normalize_time: true
  time_axis: -1
  volume_size: [16, 128, 128]
  normalize: percentile
  percentile_low: 1.0
  percentile_high: 99.0
  # Use this when latent H5 source_path was generated on another machine.
  # Example:
  # source_path_remap:
  #   - from: /workspace/Cine-UNSURE/datasets
  #     to: datasets

model:
  hidden_dim: 128
  mlp_hidden_dim: 256
  mlp_layers: 2
  process_noise_floor: 0.000001
  init_covariance: 0.000001
  calibration_lambda: 0.05
  covariance_grad: false
  jacobian_vectorize: false
  innovation_mode: diag
  deformation_shape: [16, 64, 64]
  deformation_covariance: diag
  deformation_jacobian_chunk: 512
  deformation_scale: 4.0
  zero_init_deformation: true

loss:
  ncc_win: 9
  lambda_j: 2.5
  lambda_v: 0.00005
  lambda_df: 0.05
  jitter: 0.000001

optim:
  epochs: 100
  lr: 0.0001
  weight_decay: 0.0001
  grad_clip: 1.0

output:
  run_dir: runs/nodeo_sde_deformation
  checkpoint_every: 10
